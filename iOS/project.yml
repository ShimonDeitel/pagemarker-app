name: PageMarker
options:
  bundleIdPrefix: com.shimondeitel.pagemarker
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  PageMarker:
    type: application
    platform: iOS
    sources:
      - path: PageMarker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.pagemarker
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: PageMarker/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  PageMarkerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PageMarkerTests
      - path: PageMarker.storekit
    dependencies:
      - target: PageMarker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.pagemarker.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  PageMarkerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PageMarkerUITests
    dependencies:
      - target: PageMarker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.pagemarker.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  PageMarker:
    build:
      targets:
        PageMarker: all
        PageMarkerTests: [test]
        PageMarkerUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: PageMarker.storekit
    test:
      config: Debug
      storeKitConfiguration: PageMarker.storekit
      targets:
        - PageMarkerTests
        - PageMarkerUITests
    archive:
      config: Release
